spring:
  application:
    name: mikroservis_account
  profiles:
    active: dev

  flyway:
    enabled: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        default_schema: microservice_account

  datasource:
    url: jdbc:postgresql://localhost:5432/postgre_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
